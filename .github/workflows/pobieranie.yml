name: Codzienne pobieranie grantow

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Pobranie kodu z repozytorium
      uses: actions/checkout@v4

    - name: Konfiguracja srodowiska Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalacja wymaganych bibliotek
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Uruchomienie skryptu scrapera
      run: |
        if [ -f "scrapter.py" ]; then
          python scrapter.py
        else
          python scraper.py
        fi

    - name: Automatyczny zapis pliku JSON w repozytorium
      run: |
        git config --global user.name 'Automatyczny Scraper'
        git config --global user.email 'scraper@github.com'
        git add granty.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Aktualizacja bazy grantów [Automatycznie]" && git push)
